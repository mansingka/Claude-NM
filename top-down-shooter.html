<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Assault — Top-Down Shooter</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #0a0a12;
    color: #e2e8f0;
    font-family: "Courier New", monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #wrap { text-align: center; }
  canvas {
    background: #14141f;
    border: 3px solid #2d2d44;
    border-radius: 6px;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    cursor: crosshair;
    box-shadow: 0 0 40px rgba(80,120,255,0.15);
    max-width: 100vw;
    max-height: 100vh;
  }
  .hint { margin-top: 8px; font-size: 12px; color: #5b6478; letter-spacing: 1px; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="960" height="640"></canvas>
  <div class="hint">ARROWS / WASD = move &nbsp;•&nbsp; MOUSE = aim &nbsp;•&nbsp; CLICK = shoot &nbsp;•&nbsp; P = pause</div>
</div>

<script>
(function () {
  "use strict";

  // ----- Setup -----
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const W = canvas.width, H = canvas.height;

  // ----- Palette -----
  const COL = {
    bgGrid:   "#1b1b2a",
    player:   "#5ec8ff",
    playerDk: "#2f7fb8",
    skin:     "#ffcf9e",
    gun:      "#c8d0dc",
    gunDk:    "#7a8290",
    enemy:    "#ff5a5a",
    enemyDk:  "#a82d2d",
    enemyEye: "#ffe14d",
    bullet:   "#fff27a",
    blood:    "#ff4d4d",
    spark:    "#ffd24d",
    hp:       "#54e36a",
    hpLow:    "#e35454",
    text:     "#e2e8f0",
    accent:   "#5ec8ff",
  };

  // ----- Game states -----
  const STATE = { MENU: 0, PLAYING: 1, PAUSED: 2, LEVEL_CLEAR: 3, GAME_OVER: 4, VICTORY: 5 };
  let state = STATE.MENU;

  // ----- Input -----
  const keys = new Set();
  const mouse = { x: W / 2, y: H / 2, down: false };

  // Keys that should not scroll the page / should be captured by the game
  const GAME_KEYS = new Set([
    "ArrowUp","ArrowDown","ArrowLeft","ArrowRight",
    "w","a","s","d","W","A","S","D"," ","p","P"
  ]);

  window.addEventListener("keydown", (e) => {
    if (GAME_KEYS.has(e.key)) e.preventDefault();
    keys.add(e.key.length === 1 ? e.key.toLowerCase() : e.key);

    if (e.key === "p" || e.key === "P") {
      if (state === STATE.PLAYING) state = STATE.PAUSED;
      else if (state === STATE.PAUSED) state = STATE.PLAYING;
    }
    if (e.key === "Enter" || e.key === " ") advanceScreen();
  });
  window.addEventListener("keyup", (e) => {
    keys.delete(e.key.length === 1 ? e.key.toLowerCase() : e.key);
  });

  function canvasPos(e) {
    const r = canvas.getBoundingClientRect();
    return {
      x: (e.clientX - r.left) * (W / r.width),
      y: (e.clientY - r.top) * (H / r.height),
    };
  }
  canvas.addEventListener("mousemove", (e) => {
    const p = canvasPos(e);
    mouse.x = p.x; mouse.y = p.y;
  });
  canvas.addEventListener("mousedown", (e) => {
    mouse.down = true;
    const p = canvasPos(e); mouse.x = p.x; mouse.y = p.y;
    advanceScreen();
  });
  window.addEventListener("mouseup", () => { mouse.down = false; });
  canvas.addEventListener("contextmenu", (e) => e.preventDefault());

  // Advance from non-playing screens via click / Enter / Space
  function advanceScreen() {
    if (state === STATE.MENU) startGame();
    else if (state === STATE.LEVEL_CLEAR) nextLevel();
    else if (state === STATE.GAME_OVER || state === STATE.VICTORY) {
      state = STATE.MENU;
    }
  }

  // ----- Entities -----
  let player, bullets, enemies, particles;
  let score, level, frame, shake;

  // Wave/level management
  let waves;          // array of wave configs for current level
  let waveIndex;      // current wave
  let toSpawn;        // enemies left to spawn in current wave
  let spawnTimer;     // countdown to next spawn (frames)
  let fireCooldown;   // frames until player can fire again

  const PLAYER_SPEED = 3.2;
  const PLAYER_RADIUS = 14;
  const BULLET_SPEED = 9;
  const FIRE_RATE = 9;            // frames between shots
  const ENEMY_CONTACT_DMG = 8;
  const HIT_FLASH_FRAMES = 30;

  // Build the wave list for a given level (escalating difficulty).
  function buildLevel(lvl) {
    const list = [];
    const numWaves = 2 + Math.floor(lvl / 1); // 3,4,5,6,7 ...
    for (let w = 0; w < numWaves; w++) {
      list.push({
        count: 4 + lvl * 2 + w,                       // more enemies each wave/level
        hp: 1 + Math.floor((lvl - 1) / 2),            // tougher over time
        speed: 0.9 + lvl * 0.18 + w * 0.05,           // faster over time
        size: 1,                                      // normal creature
        spawnInterval: Math.max(18, 48 - lvl * 4),    // spawn faster over time
      });
    }
    // Brute mini-boss wave from level 3 onward
    if (lvl >= 3) {
      list.push({
        count: 1 + Math.floor((lvl - 3) / 2),
        hp: 6 + lvl * 2,
        speed: 0.6 + lvl * 0.08,
        size: 2.2,
        spawnInterval: 60,
        brute: true,
      });
    }
    return list;
  }

  function startGame() {
    score = 0;
    level = 1;
    beginLevel();
  }

  function beginLevel() {
    player = {
      x: W / 2, y: H / 2,
      hp: 100, maxHp: 100,
      angle: 0, walkFrame: 0, moving: false,
      hitFlash: 0, contactCd: 0,
    };
    bullets = [];
    enemies = [];
    particles = [];
    waves = buildLevel(level);
    waveIndex = 0;
    fireCooldown = 0;
    shake = 0;
    loadWave(0);
    state = STATE.PLAYING;
  }

  function loadWave(i) {
    waveIndex = i;
    const wv = waves[i];
    toSpawn = wv.count;
    spawnTimer = 0;
  }

  function nextLevel() {
    level++;
    if (level > 5) { state = STATE.VICTORY; return; }
    beginLevel();
  }

  // ----- Spawning -----
  function spawnEnemy() {
    const wv = waves[waveIndex];
    // pick a random edge, just off-screen
    const edge = Math.floor(Math.random() * 4);
    let x, y;
    const m = 40;
    if (edge === 0) { x = Math.random() * W; y = -m; }
    else if (edge === 1) { x = W + m; y = Math.random() * H; }
    else if (edge === 2) { x = Math.random() * W; y = H + m; }
    else { x = -m; y = Math.random() * H; }
    enemies.push({
      x, y,
      hp: wv.hp, maxHp: wv.hp,
      speed: wv.speed,
      size: wv.size,
      brute: !!wv.brute,
      walkFrame: Math.random() * 100,
      hitFlash: 0,
    });
  }

  // ----- Update -----
  function update() {
    frame++;
    if (state !== STATE.PLAYING) return;

    // --- Player movement ---
    let dx = 0, dy = 0;
    if (keys.has("ArrowLeft") || keys.has("a")) dx -= 1;
    if (keys.has("ArrowRight") || keys.has("d")) dx += 1;
    if (keys.has("ArrowUp") || keys.has("w")) dy -= 1;
    if (keys.has("ArrowDown") || keys.has("s")) dy += 1;
    player.moving = (dx !== 0 || dy !== 0);
    if (player.moving) {
      const len = Math.hypot(dx, dy) || 1;
      player.x += (dx / len) * PLAYER_SPEED;
      player.y += (dy / len) * PLAYER_SPEED;
      player.walkFrame += 0.25;
    }
    // clamp to arena
    player.x = Math.max(PLAYER_RADIUS, Math.min(W - PLAYER_RADIUS, player.x));
    player.y = Math.max(PLAYER_RADIUS, Math.min(H - PLAYER_RADIUS, player.y));

    // aim at mouse
    player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
    if (player.hitFlash > 0) player.hitFlash--;
    if (player.contactCd > 0) player.contactCd--;

    // --- Shooting ---
    if (fireCooldown > 0) fireCooldown--;
    if (mouse.down && fireCooldown <= 0) {
      fire();
      fireCooldown = FIRE_RATE;
    }

    // --- Bullets ---
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx; b.y += b.vy; b.life--;
      if (b.life <= 0 || b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) {
        bullets.splice(i, 1);
      }
    }

    // --- Spawn enemies for the current wave ---
    if (toSpawn > 0) {
      spawnTimer--;
      if (spawnTimer <= 0) {
        spawnEnemy();
        toSpawn--;
        spawnTimer = waves[waveIndex].spawnInterval;
      }
    }

    // --- Enemies ---
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      const a = Math.atan2(player.y - e.y, player.x - e.x);
      e.x += Math.cos(a) * e.speed;
      e.y += Math.sin(a) * e.speed;
      e.walkFrame += 0.15 + e.speed * 0.03;
      if (e.hitFlash > 0) e.hitFlash--;

      // contact with player
      const er = 12 * e.size;
      if (dist(e.x, e.y, player.x, player.y) < er + PLAYER_RADIUS - 4) {
        if (player.contactCd <= 0) {
          damagePlayer(ENEMY_CONTACT_DMG * (e.brute ? 2 : 1));
        }
      }
    }

    // --- Bullet vs enemy collisions ---
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        const er = 12 * e.size;
        if (dist(b.x, b.y, e.x, e.y) < er + 4) {
          e.hp--;
          e.hitFlash = 6;
          bullets.splice(i, 1);
          burst(b.x, b.y, COL.blood, 5, 2.5);
          if (e.hp <= 0) {
            burst(e.x, e.y, COL.blood, 14, 4);
            burst(e.x, e.y, COL.enemyDk, 8, 3);
            enemies.splice(j, 1);
            score += e.brute ? 100 : 10;
            shake = Math.min(shake + (e.brute ? 8 : 2), 12);
          }
          break;
        }
      }
    }

    // --- Particles ---
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.92; p.vy *= 0.92;
      p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    if (shake > 0) shake *= 0.85;

    // --- Wave / level progression ---
    if (toSpawn === 0 && enemies.length === 0) {
      if (waveIndex < waves.length - 1) {
        loadWave(waveIndex + 1);
      } else {
        state = STATE.LEVEL_CLEAR;
      }
    }

    // --- Player death ---
    if (player.hp <= 0) {
      player.hp = 0;
      state = STATE.GAME_OVER;
    }
  }

  function fire() {
    const muzzle = 22;
    const mx = player.x + Math.cos(player.angle) * muzzle;
    const my = player.y + Math.sin(player.angle) * muzzle;
    bullets.push({
      x: mx, y: my,
      vx: Math.cos(player.angle) * BULLET_SPEED,
      vy: Math.sin(player.angle) * BULLET_SPEED,
      life: 70,
    });
    player.muzzle = 4; // muzzle flash frames
    burst(mx, my, COL.spark, 3, 2);
  }

  function damagePlayer(amt) {
    player.hp -= amt;
    player.hitFlash = HIT_FLASH_FRAMES;
    player.contactCd = 25;
    shake = Math.min(shake + 6, 14);
    burst(player.x, player.y, COL.player, 6, 3);
  }

  function burst(x, y, color, n, spd) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = Math.random() * spd + 0.5;
      particles.push({
        x, y,
        vx: Math.cos(a) * s, vy: Math.sin(a) * s,
        life: 12 + Math.random() * 14,
        color,
        size: 2 + Math.random() * 2,
      });
    }
  }

  function dist(x1, y1, x2, y2) { return Math.hypot(x1 - x2, y1 - y2); }

  // ----- Rendering -----
  function px(x, y, w, h, color) {
    ctx.fillStyle = color;
    ctx.fillRect(Math.round(x), Math.round(y), w, h);
  }

  function drawGrid() {
    ctx.strokeStyle = COL.bgGrid;
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = 0; x <= W; x += 32) { ctx.moveTo(x, 0); ctx.lineTo(x, H); }
    for (let y = 0; y <= H; y += 32) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
    ctx.stroke();
  }

  // Player: top-down body + rotating gun arm pointing at mouse.
  function drawPlayer(p) {
    ctx.save();
    ctx.translate(Math.round(p.x), Math.round(p.y));

    // shadow
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.beginPath();
    ctx.ellipse(0, 12, 14, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    // legs (walk animation) — drawn before rotation, simple vertical bob
    const bob = p.moving ? Math.sin(p.walkFrame) * 3 : 0;
    px(-8, 6 + bob, 5, 8, COL.playerDk);
    px(3, 6 - bob, 5, 8, COL.playerDk);

    // rotate the upper body + gun toward aim
    ctx.save();
    ctx.rotate(p.angle);

    const flash = (p.hitFlash > 0 && Math.floor(p.hitFlash / 3) % 2 === 0);
    const body = flash ? "#ffffff" : COL.player;
    const bodyDk = flash ? "#ffffff" : COL.playerDk;

    // torso (square-ish, facing +x)
    px(-10, -10, 20, 20, body);
    px(-10, -10, 20, 4, bodyDk);     // top shading
    // head
    px(-6, -6, 12, 12, COL.skin);
    // gun arm + barrel pointing along +x
    px(6, -3, 16, 6, COL.gun);       // barrel
    px(4, -6, 8, 12, COL.gunDk);     // hand/grip
    // muzzle flash
    if (p.muzzle && p.muzzle > 0) {
      px(22, -4, 6, 8, COL.bullet);
      px(26, -2, 5, 4, "#ffffff");
      p.muzzle--;
    }
    ctx.restore();
    ctx.restore();
  }

  // Enemy creature: red blob with eyes + little legs, scales by size.
  function drawEnemy(e) {
    ctx.save();
    ctx.translate(Math.round(e.x), Math.round(e.y));
    const s = e.size;
    // face the player
    const a = Math.atan2(player.y - e.y, player.x - e.x);

    // shadow
    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.beginPath();
    ctx.ellipse(0, 11 * s, 12 * s, 5 * s, 0, 0, Math.PI * 2);
    ctx.fill();

    // wobbling legs
    const wob = Math.sin(e.walkFrame) * 3 * s;
    const body = e.hitFlash > 0 ? "#ffffff" : COL.enemy;
    const bodyDk = e.hitFlash > 0 ? "#ffffff" : COL.enemyDk;

    px(-9 * s, 6 * s + wob, 5 * s, 7 * s, bodyDk);
    px(4 * s, 6 * s - wob, 5 * s, 7 * s, bodyDk);

    // body
    ctx.save();
    ctx.rotate(a);
    px(-11 * s, -11 * s, 22 * s, 22 * s, body);
    px(-11 * s, 5 * s, 22 * s, 6 * s, bodyDk);  // bottom shading
    // eyes (toward player / +x)
    px(2 * s, -7 * s, 5 * s, 5 * s, COL.enemyEye);
    px(2 * s, 2 * s, 5 * s, 5 * s, COL.enemyEye);
    px(4 * s, -6 * s, 2 * s, 2 * s, "#1a1a1a");
    px(4 * s, 3 * s, 2 * s, 2 * s, "#1a1a1a");
    // angry brow
    px(-2 * s, -9 * s, 11 * s, 2 * s, "#1a1a1a");
    ctx.restore();

    // HP pip for brutes
    if (e.brute) {
      const wbar = 28 * s;
      px(-wbar / 2, -16 * s, wbar, 4, "#000");
      px(-wbar / 2, -16 * s, wbar * (e.hp / e.maxHp), 4, COL.hp);
    }
    ctx.restore();
  }

  function drawBullet(b) {
    px(b.x - 3, b.y - 2, 7, 4, COL.bullet);
    px(b.x - 1, b.y - 1, 3, 2, "#ffffff");
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, Math.min(1, p.life / 20));
      px(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size, p.color);
    }
    ctx.globalAlpha = 1;
  }

  function drawHUD() {
    // HP bar
    const bx = 16, by = 16, bw = 220, bh = 18;
    px(bx - 2, by - 2, bw + 4, bh + 4, "#000");
    px(bx, by, bw, bh, "#33223a");
    const frac = Math.max(0, player.hp / player.maxHp);
    px(bx, by, bw * frac, bh, frac > 0.3 ? COL.hp : COL.hpLow);
    ctx.fillStyle = COL.text;
    ctx.font = "12px 'Courier New', monospace";
    ctx.textAlign = "left";
    ctx.fillText("HP " + Math.ceil(player.hp), bx + 6, by + 13);

    // Score + level + wave
    ctx.textAlign = "right";
    ctx.font = "16px 'Courier New', monospace";
    ctx.fillText("SCORE " + score, W - 16, 28);
    ctx.textAlign = "center";
    ctx.fillStyle = COL.accent;
    ctx.fillText("LEVEL " + level + "  —  WAVE " + (waveIndex + 1) + "/" + waves.length,
                 W / 2, 28);
    const remaining = enemies.length + toSpawn;
    ctx.fillStyle = COL.text;
    ctx.font = "13px 'Courier New', monospace";
    ctx.fillText("Enemies left: " + remaining, W / 2, 46);
  }

  // ----- Screen overlays -----
  function dim(alpha) {
    ctx.fillStyle = "rgba(8,8,16," + alpha + ")";
    ctx.fillRect(0, 0, W, H);
  }
  function center(text, y, size, color) {
    ctx.fillStyle = color || COL.text;
    ctx.font = "bold " + size + "px 'Courier New', monospace";
    ctx.textAlign = "center";
    ctx.fillText(text, W / 2, y);
  }
  function blink(text, y, size, color) {
    if (Math.floor(frame / 30) % 2 === 0) center(text, y, size, color);
  }

  function drawMenu() {
    dim(0.6);
    center("PIXEL ASSAULT", H / 2 - 90, 56, COL.accent);
    center("a retro top-down shooter", H / 2 - 50, 18, "#8a93a8");
    blink("CLICK or press ENTER to start", H / 2 + 20, 22, COL.text);
    center("ARROWS / WASD — move", H / 2 + 70, 16, "#8a93a8");
    center("MOUSE — aim     CLICK — shoot     P — pause", H / 2 + 96, 16, "#8a93a8");
    center("Survive 5 levels of escalating swarms.", H / 2 + 134, 14, "#5b6478");
  }
  function drawPaused() {
    dim(0.55);
    center("PAUSED", H / 2 - 10, 48, COL.accent);
    blink("press P to resume", H / 2 + 36, 18, COL.text);
  }
  function drawLevelClear() {
    dim(0.6);
    center("LEVEL " + level + " CLEAR!", H / 2 - 30, 44, COL.hp);
    center("Score: " + score, H / 2 + 14, 22, COL.text);
    blink("CLICK or press ENTER for next level", H / 2 + 60, 18, COL.accent);
  }
  function drawGameOver() {
    dim(0.65);
    center("GAME OVER", H / 2 - 30, 52, COL.hpLow);
    center("You reached level " + level + " — Score: " + score, H / 2 + 18, 20, COL.text);
    blink("CLICK or press ENTER for the menu", H / 2 + 64, 18, COL.accent);
  }
  function drawVictory() {
    dim(0.65);
    center("VICTORY!", H / 2 - 40, 56, COL.bullet);
    center("You cleared all 5 levels!", H / 2 + 6, 22, COL.text);
    center("Final Score: " + score, H / 2 + 40, 22, COL.hp);
    blink("CLICK or press ENTER for the menu", H / 2 + 86, 18, COL.accent);
  }

  // ----- Main render -----
  function render() {
    ctx.save();
    // screen shake
    if ((state === STATE.PLAYING || state === STATE.PAUSED) && shake > 0.2) {
      ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
    }

    // background
    ctx.fillStyle = "#14141f";
    ctx.fillRect(-20, -20, W + 40, H + 40);
    drawGrid();

    if (state === STATE.PLAYING || state === STATE.PAUSED ||
        state === STATE.LEVEL_CLEAR || state === STATE.GAME_OVER) {
      // world (drawn even behind overlays so it stays visible)
      if (player) {
        for (const b of bullets) drawBullet(b);
        for (const e of enemies) drawEnemy(e);
        drawPlayer(player);
        drawParticles();
        drawHUD();
      }
    }

    ctx.restore();

    // overlays (not shaken)
    if (state === STATE.MENU) drawMenu();
    else if (state === STATE.PAUSED) drawPaused();
    else if (state === STATE.LEVEL_CLEAR) drawLevelClear();
    else if (state === STATE.GAME_OVER) drawGameOver();
    else if (state === STATE.VICTORY) drawVictory();
  }

  // ----- Loop -----
  frame = 0;
  function loop() {
    update();
    render();
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
</body>
</html>
